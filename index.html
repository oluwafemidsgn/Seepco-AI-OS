<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seepco AI OS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">

    <header class="brand">Seepco AI OS</header>

    <main class="main-content">
      <div class="pixel-grids pixel-grids--left" id="gridsLeft"></div>

      <div class="login-card">
        <div class="login-card__inner">

          <div class="login-card__heading">
            <h1 class="login-card__title">Welcome back</h1>
            <p class="login-card__subtitle">If you don't have an account reach out to HR</p>
          </div>

          <form class="login-form" id="loginForm" novalidate>
            <div class="form-fields">
              <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input
                  class="form-input"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="name@example.com"
                  autocomplete="email"
                  required
                >
              </div>
              <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                  <input
                    class="form-input"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                  >
                  <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <svg class="eye-icon" id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <a href="#" class="forgot-password">Forgot password?</a>

            <button type="submit" class="btn-continue" id="continueBtn">
              <span class="btn-continue__text">Continue</span>
              <span class="btn-continue__spinner" id="btnSpinner" aria-hidden="true"></span>
            </button>

            <p class="form-error" id="formError" role="alert" aria-live="polite"></p>
          </form>

        </div>
      </div>

      <div class="pixel-grids pixel-grids--right" id="gridsRight"></div>
    </main>

    <footer class="footer">Seepco AI OS v1.0 — Powered by Unrealabs</footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
