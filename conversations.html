<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seepco AI OS — My Conversations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="inner-pages.css">
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand-row">
      <span class="sidebar__brand-text">Seepco AI OS</span>
      <button class="sidebar__collapse-btn" id="collapseBtn" aria-label="Collapse sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="14 9 11 12 14 15"/></svg>
      </button>
    </div>
    <nav class="sidebar__nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
        <span class="nav-item__label">New chat</span>
      </a>
      <a href="conversations.html" class="nav-item nav-item--active">
        <span class="nav-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <span class="nav-item__label">My conversations</span>
      </a>
      <a href="bookmarks.html" class="nav-item">
        <span class="nav-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span>
        <span class="nav-item__label">Bookmarked answers</span>
      </a>
      <details class="nav-group">
        <summary class="nav-item nav-item--expandable">
          <span class="nav-item__left">
            <span class="nav-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
            <span class="nav-item__label">Knowledge Base</span>
          </span>
          <svg class="nav-item__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="nav-sub">
          <form class="nav-sub__search" action="knowledge-base.html" method="get" role="search">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#aab2bd" stroke-width="1.2"/><line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="#aab2bd" stroke-width="1.2" stroke-linecap="round"/></svg>
            <input type="text" name="q" placeholder="Search knowledge base…" aria-label="Search knowledge base">
          </form>
          <a href="knowledge-base.html" class="nav-sub__item">Search</a>
          <a href="knowledge-base.html?screen=mysearch" class="nav-sub__item">My searches</a>
          <a href="knowledge-base.html?screen=mysaves" class="nav-sub__item">My saves</a>
        </div>
      </details>
      <a href="agents.html" class="nav-item nav-item--expandable">
        <span class="nav-item__left">
          <span class="nav-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span>
          <span class="nav-item__label">Departments AI</span>
        </span>
        <svg class="nav-item__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </a>
      <a href="help.html" class="nav-item">
        <span class="nav-item__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
        <span class="nav-item__label">Help &amp; support</span>
      </a>
    </nav>
    <div class="sidebar__user">
      <div class="user-info">
        <div class="user-avatar">OF</div>
        <div class="user-details">
          <span class="user-name">Oduneye Oluwafemi</span>
          <span class="user-role">HR Specialist</span>
        </div>
      </div>
      <button class="user-menu-btn" aria-label="User menu">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── MAIN CARD ───────────────────────────────────────── -->
  <main class="main-card">
    <div class="deco-grids" id="decoGrids"></div>
    <div class="page-scroll">

      <section class="page-heading">
        <div>
          <h1 class="page-heading__title">My Conversations</h1>
          <p class="page-heading__sub">6 conversations</p>
        </div>
      </section>

      <!-- Today -->
      <div>
        <p class="section-label">Today</p>
        <div class="convo-list" id="convosToday"></div>
      </div>

      <!-- Yesterday -->
      <div>
        <p class="section-label">Yesterday</p>
        <div class="convo-list" id="convosYesterday"></div>
      </div>

      <!-- This week -->
      <div>
        <p class="section-label">This week</p>
        <div class="convo-list" id="convosWeek"></div>
      </div>

    </div>
  </main>
</div>
<script src="conversations.js"></script>
</body>
</html>
