<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seepco AI OS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="app">

    <!-- ── SIDEBAR ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand-row">
        <span class="sidebar__brand-text">Seepco AI OS</span>
        <button class="sidebar__collapse-btn" id="collapseBtn" aria-label="Collapse sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="14 9 11 12 14 15"/></svg>
        </button>
      </div>

      <nav class="sidebar__nav">
        <a href="dashboard.html" class="nav-item nav-item--active">
          <span class="nav-item__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </span>
          <span class="nav-item__label">New chat</span>
        </a>
        <a href="conversations.html" class="nav-item">
          <span class="nav-item__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="nav-item__label">My conversations</span>
        </a>
        <a href="bookmarks.html" class="nav-item">
          <span class="nav-item__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="nav-item__label">Bookmarked answers</span>
        </a>
        <a href="agents.html" class="nav-item nav-item--expandable">
          <span class="nav-item__left">
            <span class="nav-item__icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </span>
            <span class="nav-item__label">Departments AI</span>
          </span>
          <svg class="nav-item__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <a href="help.html" class="nav-item">
          <span class="nav-item__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </span>
          <span class="nav-item__label">Help &amp; support</span>
        </a>
      </nav>

      <div class="sidebar__user">
        <div class="user-info">
          <div class="user-avatar">OF</div>
          <div class="user-details">
            <span class="user-name">Oduneye Oluwafemi</span>
            <span class="user-role">HR Specialist</span>
          </div>
        </div>
        <button class="user-menu-btn" aria-label="User menu">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/></svg>
        </button>
      </div>
    </aside>

    <!-- ── MAIN CARD ───────────────────────────────────────── -->
    <main class="main-card">

      <!-- Pixel grid decoration: top-right corner, partially clipped -->
      <div class="deco-grids" id="decoGrids"></div>

      <div class="main-card__scroll">

        <!-- Greeting -->
        <section class="greeting">
          <h1 class="greeting__title" id="greetingText">Good afternoon, Oluwafemi</h1>
          <p class="greeting__sub">What do you need today?</p>
        </section>

        <!-- ── CHAT BOX ── grey container with white inner card -->
        <section class="chat-box">

          <!-- White input card (contains textarea + all action buttons) -->
          <div class="chat-card">
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="Ask anything — HR, Legal, Finance, Operations..."
              rows="2"
              aria-label="Ask a question"
            ></textarea>

            <!-- Action bar INSIDE the white card -->
            <div class="chat-actions">
              <button class="chat-add-btn" aria-label="Attach file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add
              </button>
              <div class="chat-actions__right">
                <button class="chat-icon-btn" aria-label="Microphone">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button class="chat-icon-btn" aria-label="Voice wave">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </button>
                <button class="chat-ask-btn" id="askBtn">Ask</button>
              </div>
            </div>
          </div>

          <!-- Suggestions row in the grey area below the white card -->
          <div class="suggestions">
            <span class="suggestions__label">Suggestions</span>
            <div class="suggestions__pills" id="suggestionPills">
              <button class="pill">What's the policy for annual leave?</button>
              <button class="pill">Show Warri field production this week</button>
              <button class="pill">Review this contract for risks</button>
            </div>
          </div>

        </section>

        <!-- Agents grid -->
        <section class="agents-section">
          <h2 class="agents-section__title">Agents</h2>
          <div class="agents-grid" id="agentsGrid"></div>
        </section>

      </div><!-- /.main-card__scroll -->
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
